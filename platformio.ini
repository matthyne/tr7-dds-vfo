; ============================================================
;  platformio.ini — TR7 DDS VFO main firmware
;  Board: ESP32-2432S028 ("Cheap Yellow Display")
; ============================================================

[env:tr7_vfo]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

; SPIFFS partition for smooth fonts (if used)
board_build.partitions = min_spiffs.csv
board_build.filesystem = spiffs

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    madhephaestus/ESP32Encoder @ ^0.10.2
    bblanchon/ArduinoJson @ ^7.0.4

; TFT_eSPI pin config via build flags (no need to edit library files)
build_flags =
    -D USER_SETUP_LOADED
    -D ILI9341_DRIVER
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_MISO=12
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=1
    -D TOUCH_CS=33
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D ESP32_DMA=1
    -D SUPPORT_TRANSACTIONS=1
    -D CORE_DEBUG_LEVEL=0
    ; Include paths
    -I include

upload_speed = 921600

; Monitor: show decoded exception backtraces on crash
; Requires xtensa-esp32-elf-addr2line in PATH (comes with ESP-IDF)
